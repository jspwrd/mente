site_name: mente
site_description: A minimalist cognitive-architecture framework for Python.
site_url: https://jspwrd.github.io/mente/
repo_url: https://github.com/jspwrd/mente
edit_uri: edit/main/docs/
exclude_docs: |
  launch-post.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Tutorials:
      - Quickstart: tutorials/quickstart.md
      - Build an Agent: tutorials/build-an-agent.md
      - Extending: extending.md
  - Reference:
      - Overview: reference/index.md
      - bus: reference/bus.md
      - runtime: reference/runtime.md
      - router: reference/router.md
      - reasoners: reference/reasoners.md
      - memory: reference/memory.md
      - embeddings: reference/embeddings.md
      - synthesis: reference/synthesis.md
      - verifier: reference/verifier.md
      - tools: reference/tools.md
      - discovery: reference/discovery.md
      - types: reference/types.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            docstring_style: google
            merge_init_into_class: true
